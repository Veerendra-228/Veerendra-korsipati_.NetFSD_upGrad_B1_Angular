<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>EventSphere Portal</title>

<!-- Bootstrap -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
height:100vh;
display:flex;
align-items:center;
justify-content:center;
background:linear-gradient(135deg,#0d6efd,#6f42c1);
font-family:"Segoe UI",sans-serif;
}

.portal-card{
width:400px;
padding:40px;
border-radius:15px;
text-align:center;
background:white;
box-shadow:0 10px 25px rgba(0,0,0,0.2);
}

.portal-title{
font-weight:700;
margin-bottom:30px;
color:#0d6efd;
}

.portal-btn{
width:100%;
margin-top:15px;
padding:12px;
font-size:18px;
border-radius:8px;
transition:all 0.3s ease;
}

.portal-btn:hover{
transform:scale(1.05);
}

</style>
</head>

<body>

<div class="portal-card">

<h2 class="portal-title">EventSphere</h2>

<button class="btn btn-primary portal-btn" onclick="goAdmin()">
Admin
</button>

<button class="btn btn-warning portal-btn" onclick="goRegister()">
Register
</button>

</div>

<script>

function goAdmin(){
window.location.href="index.html";
}

function goRegister(){
window.location.href="register.html";
}

</script>

</body>
</html>
