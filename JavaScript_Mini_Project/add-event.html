<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>EventSphere - Add/Edit Event</title>
  
  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="add-event.css">
</head>
<body class="bg-light">

<div class="container mt-5">

  <div class="row justify-content-center">
    <div class="col-md-6">

      <div class="card shadow-lg border-0">
        <div class="card-header bg-primary text-white text-center">
          <h4 class="mb-0">Add / Edit Event</h4>
        </div>

        <div class="card-body">

          <form id="eventForm">

            <div class="mb-3">
              <label class="form-label">Event Title</label>
              <input type="text" class="form-control" id="title" placeholder="Enter event title" required>
            </div>

            <div class="mb-3">
              <label class="form-label">Description</label>
              <textarea class="form-control" id="description" rows="3"></textarea>
            </div>

            <div class="mb-3">
              <label class="form-label">Event Date</label>
              <input type="date" class="form-control" id="date" required>
            </div>

            <div class="mb-3">
              <label class="form-label">Location</label>
              <input type="text" class="form-control" id="location" placeholder="Enter location" required>
            </div>

            <div class="mb-3">
              <label class="form-label">Capacity</label>
              <input type="number" class="form-control" id="capacity" placeholder="Enter capacity" required>
            </div>

            <button type="submit" class="btn btn-primary w-100">
              Save Event
            </button>

          </form>

        </div>
      </div>

    </div>
  </div>

</div>

<script type="module">
import { handleAddEvent, loadEventForEdit } from "./js/controllers/eventController.js";
document.getElementById("eventForm").addEventListener("submit", handleAddEvent);
loadEventForEdit();
</script>

</body>
