<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="register.css">
  <title>Register for Event</title>
</head>
<body class="bg-light">

<div class="container mt-5">

  <div class="row justify-content-center">
    <div class="col-md-6">

      <div class="card shadow-lg border-0">

        <div class="card-header bg-warning text-dark text-center">
          <h4 class="mb-0">Event Registration</h4>
        </div>

        <div class="card-body">

          <form id="registrationForm">

            <div class="mb-3">
              <label class="form-label">Event ID</label>
              <input type="text" class="form-control" id="eventId" placeholder="Enter Event ID" required>
            </div>

            <div class="mb-3">
              <label class="form-label">Participant Name</label>
              <input type="text" class="form-control" id="participantName" placeholder="Enter your name" required>
            </div>

            <div class="mb-3">
              <label class="form-label">Email</label>
              <input type="email" class="form-control" id="email" placeholder="Enter email" required>
            </div>

            <div class="mb-3">
              <label class="form-label">Phone</label>
              <input type="text" class="form-control" id="phone" placeholder="10 digit phone number" required>
            </div>

            <button type="button" id="registerBtn" class="btn btn-warning w-100">
              Register for Event
            </button>

          </form>

        </div>

      </div>

    </div>
  </div>

</div>

<script type="module">
import { handleRegistration } from "./js/controllers/registrationController.js";

document
  .getElementById("registerBtn")
  .addEventListener("click", handleRegistration);
</script>

</body>
</html>
